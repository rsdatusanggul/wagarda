<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAGARDA Login</title>
    <style>
        :root {
            --primary-color: #25d366;
            --secondary-color: #075e54;
            --background-color: #f0f2f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h1 {
            color: var(--secondary-color);
            font-size: 2rem;
            margin-bottom: 0.3rem;
        }

        .login-card .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
        }

        /* Error/warning banners */
        .alert {
            display: none;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.2rem;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: left;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .alert-danger {
            background-color: #fdecea;
            border: 1px solid #f5c2c7;
            color: #842029;
        }

        .alert-warning {
            background-color: #fff3cd;
            border: 1px solid #ffda6a;
            color: #664d03;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: #444;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.15);
        }

        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-container .toggle-password {
            position: absolute;
            right: 0.75rem;
            cursor: pointer;
            color: #888;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .password-container .toggle-password:focus {
            outline: none;
        }
        
        .password-container .toggle-password:hover {
            color: #333;
        }

        .btn-login {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
            transition: background 0.3s, transform 0.1s;
        }

        .btn-login:hover { background-color: #1db954; }
        .btn-login:active { transform: scale(0.98); }

        .footer {
            margin-top: 1.8rem;
            font-size: 0.75rem;
            color: #bbb;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1>WAGARDA</h1>
        <p class="subtitle">WhatsApp Gateway Multi-Device</p>

        <div id="alert-invalid" class="alert alert-danger">
            ❌ Username atau Password salah. Silakan coba lagi.
        </div>
        <div id="alert-locked" class="alert alert-warning">
            🔒 Akun dikunci sementara. Terlalu banyak percobaan login gagal. Coba lagi dalam 30 menit.
        </div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Masukkan username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-container">
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Masukkan password" style="padding-right: 2.5rem;">
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password" title="Tampilkan/sembunyikan password">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle class="eye-open" cx="12" cy="12" r="3"></circle>
                            <path class="eye-closed" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" style="display: none;"></path>
                            <line class="eye-closed" x1="1" y1="1" x2="23" y2="23" style="display: none;"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="footer">
            &copy; 2026 WAGARDA &mdash; Powered by ITD RSUD Datu Sanggul
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        if (error === '1') {
            document.getElementById('alert-invalid').style.display = 'block';
        } else if (error === 'locked') {
            document.getElementById('alert-locked').style.display = 'block';
        }

        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeOpenIcons = document.querySelectorAll('.eye-open');
        const eyeClosedIcons = document.querySelectorAll('.eye-closed');

        togglePassword.addEventListener('click', function () {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            
            eyeOpenIcons.forEach(icon => icon.style.display = isPassword ? 'none' : 'block');
            eyeClosedIcons.forEach(icon => icon.style.display = isPassword ? 'block' : 'none');
            togglePassword.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        });
    </script>
</body>

</html>
