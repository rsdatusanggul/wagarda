services:
  wagarda:
    image: ghcr.io/rsdatusanggul/wagarda:main
    container_name: wagarda-app
    expose:
      - "10000"
    volumes:
      - ./sessions:/usr/src/app/sessions
      - ./wagarda.db:/usr/src/app/wagarda.db
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=${PORT}
      - SESSION_SECRET=${SESSION_SECRET}
      - DEFAULT_ADMIN_USER=${DEFAULT_ADMIN_USER}
      - DEFAULT_ADMIN_PASS=${DEFAULT_ADMIN_PASS}
      - DEFAULT_API_KEY=${DEFAULT_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ENABLE_API_DOCS=${ENABLE_API_DOCS:-false}
      - BODY_LIMIT=${BODY_LIMIT:-1mb}
      - PARAMETER_LIMIT=${PARAMETER_LIMIT:-1000}

  nginx:
    image: nginx:alpine
    container_name: wagarda-nginx
    ports:
      - "127.0.0.1:8180:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wagarda
    restart: unless-stopped

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: wagarda-tunnel
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped
