services:
  wagarda:
    build: .
    container_name: wagarda-app
    ports:
      - "10000:10000" # Untuk akses lokal langsung
    volumes:
      - ./sessions:/usr/src/app/sessions
      - ./wagarda.db:/usr/src/app/wagarda.db
      - ./.env:/usr/src/app/.env
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    container_name: wagarda-nginx
    ports:
      - "8180:80" # Untuk akses lokal via Nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wagarda
    restart: unless-stopped

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: wagarda-tunnel
    command: tunnel --no-autoupdate --url http://nginx:80
    depends_on:
      - nginx
    restart: unless-stopped
