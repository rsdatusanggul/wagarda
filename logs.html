<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Gateway Logs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .success {
            color: green;
            font-weight: bold;
        }

        .failed {
            color: red;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
        }

        .input-group {
            margin: 20px auto;
            text-align: center;
        }

        .input-group input {
            padding: 8px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .refresh-btn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .refresh-btn:hover {
            background-color: #0056b3;
        }

        .error-msg {
            color: red;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <a href="/" style="text-decoration: none; color: #007bff;">&larr; Back to Dashboard</a>
            <h1>Message Logs</h1>
            <a href="/logout"
                style="text-decoration: none; padding: 8px 12px; background-color: #6c757d; color: white; border-radius: 5px;">Logout</a>
        </div>

        <div class="input-group">
            <input type="password" id="api-key" placeholder="Optional: API Key (header x-api-key)" />
            <button id="btn-view-logs" class="refresh-btn">View Logs</button>
        </div>
        <p id="error-msg" class="error-msg"></p>

        <table id="logs-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Timestamp</th>
                    <th>Sender</th>
                    <th>Recipient</th>
                    <th>Message</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <!-- Logs will be inserted here -->
            </tbody>
        </table>
    </div>

    <script>
        document.getElementById('btn-view-logs').addEventListener('click', fetchLogs);

        async function fetchLogs() {
            const apiKey = document.getElementById('api-key').value.trim();
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            try {
                const headers = {};
                if (apiKey) {
                    headers['x-api-key'] = apiKey;
                }

                const response = await fetch('/wagateway/logs', { headers });
                const result = await response.json();

                if (result.status) {
                    const tbody = document.querySelector('#logs-table tbody');
                    tbody.innerHTML = '';

                    if (result.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No logs found</td></tr>';
                        return;
                    }

                    result.data.forEach(log => {
                        const row = document.createElement('tr');
                        const statusClass = String(log.status || '').startsWith('success') ? 'success' : 'failed';

                        // Parse message if it's JSON
                        let messageDisplay = String(log.message || '');
                        try {
                            const msgObj = JSON.parse(log.message);
                            if (msgObj.text) messageDisplay = msgObj.text;
                            else if (msgObj.image) messageDisplay = '[Image] ' + (msgObj.caption || '');
                            else if (msgObj.document) messageDisplay = '[Document] ' + (msgObj.fileName || '');
                        } catch (e) {
                            // Not JSON, keep as is
                        }

                        const tdId = document.createElement('td');
                        tdId.textContent = String(log.id ?? '');

                        const tdTimestamp = document.createElement('td');
                        tdTimestamp.textContent = new Date(log.timestamp).toLocaleString();

                        const tdSender = document.createElement('td');
                        tdSender.textContent = String(log.sender ?? '');

                        const tdRecipient = document.createElement('td');
                        tdRecipient.textContent = String(log.recipient ?? '');

                        const tdMessage = document.createElement('td');
                        tdMessage.textContent = messageDisplay;

                        const tdStatus = document.createElement('td');
                        tdStatus.className = statusClass;
                        tdStatus.textContent = String(log.status ?? '');

                        row.append(tdId, tdTimestamp, tdSender, tdRecipient, tdMessage, tdStatus);
                        tbody.appendChild(row);
                    });
                } else {
                    errorMsg.textContent = 'Error: ' + result.msg;
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Error fetching logs:', error);
                errorMsg.textContent = 'Failed to fetch logs';
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>

</html>
